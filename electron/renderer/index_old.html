<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>MotionBloom Electron</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>MotionBloom</h1>
        <p>Chromium desktop UI switch</p>
      </div>
      <div class="actions">
        <span id="status-pill" class="pill idle">Idle</span>
        <button id="start-btn" class="btn primary">Start Analysis</button>
        <button id="stop-btn" class="btn">Stop</button>
      </div>
    </header>

    <main class="layout">
      <section class="camera-panel">
        <h2>Camera Preview</h2>
        <video id="camera" autoplay playsinline muted></video>
        <p id="camera-note">Local webcam preview (renderer side).</p>
      </section>

      <section class="metrics-panel">
        <h2>Live Metrics</h2>
        <div class="grid" id="metric-grid"></div>
        <pre id="log-box" class="log-box"></pre>
      </section>
    </main>

    <script src="./renderer.js"></script>
  </body>
  </html>
