name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            artifact: TremorLab-macos-x64
          - os: macos-14
            artifact: TremorLab-macos-arm64
          - os: windows-latest
            artifact: TremorLab-windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build
        working-directory: packaging
        run: pyinstaller --noconfirm tremorlab.spec

      - name: Package (zip)
        shell: bash
        run: |
          cd packaging/dist
          if [ -d "TremorLab.app" ]; then
            zip -r "../../${{ matrix.artifact }}.zip" "TremorLab.app"
          else
            7z a -tzip "../../${{ matrix.artifact }}.zip" "TremorLab" || zip -r "../../${{ matrix.artifact }}.zip" "TremorLab"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
