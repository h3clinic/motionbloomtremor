# Hand Pose Library
# Each pose defines bone rotation angles in degrees.
# Bones follow the naming from handharness/rig_map.json
# (thumb_meta, thumb_prox, thumb_dist, index_meta, index_prox, index_midd, etc.)
#
# Convention:
#   Positive = flexion (curl inward)
#   Negative = extension (straighten/spread)
#   wrist_pitch: + = flexion, - = extension
#   wrist_yaw: + = ulnar deviation, - = radial deviation
#   wrist_roll: + = pronation, - = supination

poses:
  REST_OPEN:
    description: "Relaxed open hand, fingers slightly curved"
    wrist_pitch: 0
    wrist_yaw: 0
    wrist_roll: 0
    thumb_meta: 5
    thumb_prox: 8
    thumb_dist: 5
    index_meta: 5
    index_prox: 10
    index_midd: 5
    middle_meta: 5
    middle_prox: 10
    middle_midd: 5
    ring_meta: 8
    ring_prox: 12
    ring_midd: 8
    pinky_meta: 10
    pinky_prox: 15
    pinky_midd: 10

  REST_CLOSED:
    description: "Loose fist, fingers curled"
    wrist_pitch: 0
    wrist_yaw: 0
    wrist_roll: 0
    thumb_meta: 25
    thumb_prox: 40
    thumb_dist: 30
    index_meta: 45
    index_prox: 80
    index_midd: 70
    middle_meta: 45
    middle_prox: 80
    middle_midd: 70
    ring_meta: 45
    ring_prox: 80
    ring_midd: 70
    pinky_meta: 45
    pinky_prox: 80
    pinky_midd: 70

  PINCH:
    description: "Thumb and index pinching, other fingers relaxed"
    wrist_pitch: -5
    wrist_yaw: 0
    wrist_roll: 0
    thumb_meta: 35
    thumb_prox: 45
    thumb_dist: 20
    index_meta: 30
    index_prox: 45
    index_midd: 25
    middle_meta: 5
    middle_prox: 10
    middle_midd: 5
    ring_meta: 8
    ring_prox: 12
    ring_midd: 8
    pinky_meta: 10
    pinky_prox: 15
    pinky_midd: 10

  POINTING:
