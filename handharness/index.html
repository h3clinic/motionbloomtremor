<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Hand Grid Blueprint</title>
    <style>
      :root {
        --bg-a: #06122b;
        --bg-b: #020712;
        --ink: #89d7ff;
        --ink-strong: #b9ecff;
        --line-faint: rgba(137, 215, 255, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background: radial-gradient(circle at 50% 30%, var(--bg-a), var(--bg-b) 68%);
        color: var(--ink);
      }

      #app {
        position: fixed;
        inset: 0;
      }

      .hud {
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 10;
        padding: 12px 14px;
        border: 1px solid var(--line-faint);
        background: rgba(2, 8, 20, 0.56);
        backdrop-filter: blur(5px);
        border-radius: 8px;
      }

      .hud h1 {
        margin: 0;
        font-size: 13px;
        letter-spacing: 0.16em;
        font-weight: 700;
        color: var(--ink-strong);
      }

      .hud p {
        margin: 7px 0 0;
        font-size: 11px;
        letter-spacing: 0.06em;
        opacity: 0.8;
      }

      .vignette {
        pointer-events: none;
        position: fixed;
        inset: 0;
        background: radial-gradient(circle, transparent 60%, rgba(0, 0, 0, 0.35));
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <aside class="hud">
      <h1>HAND BLUEPRINT // GRID STUDY</h1>
      <p>Rotate: drag</p>
    </aside>
    <div class="vignette"></div>

    <script>
      const app = document.getElementById("app");
      const canvas = document.createElement("canvas");
      app.appendChild(canvas);
      const ctx = canvas.getContext("2d");

      let width = 0;
      let height = 0;
      let dpr = 1;

      function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = width + "px";
        canvas.style.height = height + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function v(x, y, z) {
        return { x, y, z };
      }

      function rotateX(p, a) {
        const c = Math.cos(a);
        const s = Math.sin(a);
        return v(p.x, p.y * c - p.z * s, p.y * s + p.z * c);
      }

      function rotateY(p, a) {
        const c = Math.cos(a);
        const s = Math.sin(a);
        return v(p.x * c + p.z * s, p.y, -p.x * s + p.z * c);
      }

      function rotateZ(p, a) {
        const c = Math.cos(a);
        const s = Math.sin(a);
        return v(p.x * c - p.y * s, p.x * s + p.y * c, p.z);
      }

      function transformPoint(p, rotation, offset) {
        let t = rotateX(p, rotation.x);
        t = rotateY(t, rotation.y);
        t = rotateZ(t, rotation.z);
        return v(t.x + offset.x, t.y + offset.y, t.z + offset.z);
      }

      function project(p) {
        const fov = 450;
        const z = p.z + 6.5;
        const scale = fov / z;
        return {
          x: width * 0.5 + p.x * scale,
          y: height * 0.56 - p.y * scale,
          z,
          scale,
        };
      }

      function drawLine(a, b, alpha, lineWidth) {
        const pa = project(a);
        const pb = project(b);
        ctx.strokeStyle = `rgba(184,235,255,${alpha})`;
        ctx.lineWidth = lineWidth;
        ctx.beginPath();
        ctx.moveTo(pa.x, pa.y);
        ctx.lineTo(pb.x, pb.y);
        ctx.stroke();
      }

      function drawJoint(p, radius, alpha) {
        const pp = project(p);
        ctx.strokeStyle = `rgba(184,235,255,${alpha})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(pp.x, pp.y, Math.max(1.2, radius * pp.scale * 0.12), 0, Math.PI * 2);
        ctx.stroke();
      }

      function drawGrid(time) {
        const gridY = -1.35;
        const span = 8;
        const step = 0.5;
        const drift = (time * 0.35) % step;

        for (let i = -span; i <= span; i += step) {
          const z = i + drift;
          const a = v(-span, gridY, z);
          const b = v(span, gridY, z);
          const depthFade = 0.09 + (span - Math.abs(i)) * 0.015;
          drawLine(a, b, depthFade, 1);
        }

        for (let i = -span; i <= span; i += step) {
          const x = i;
          const a = v(x, gridY, -span + drift);
          const b = v(x, gridY, span + drift);
          const depthFade = 0.08 + (span - Math.abs(i)) * 0.012;
          drawLine(a, b, depthFade, 1);
        }
      }

      function makeHandSkeleton() {
        const joints = [];
        const links = [];

        const wrist = v(0, -0.5, -0.2);
        const palmLeft = v(-0.95, -0.1, -0.02);
        const palmRight = v(0.9, -0.05, 0.02);
        const palmTopLeft = v(-0.7, 0.55, 0.35);
        const palmTopRight = v(0.62, 0.62, 0.38);

        joints.push(wrist, palmLeft, palmRight, palmTopLeft, palmTopRight);
        links.push([0, 1], [0, 2], [1, 3], [2, 4], [3, 4], [1, 2]);

        const fingerBases = [
          v(-0.58, 0.54, 0.4),
          v(-0.2, 0.63, 0.44),
          v(0.16, 0.68, 0.44),
          v(0.5, 0.62, 0.4),
        ];

        const fingerDirections = [
          [v(-0.03, 0.58, 0.02), v(-0.02, 0.45, 0.02), v(-0.01, 0.34, 0.02)],
          [v(0.0, 0.67, 0.03), v(0.01, 0.53, 0.03), v(0.02, 0.41, 0.03)],
          [v(0.01, 0.64, 0.03), v(0.02, 0.5, 0.03), v(0.03, 0.38, 0.03)],
          [v(0.03, 0.56, 0.02), v(0.04, 0.42, 0.02), v(0.05, 0.31, 0.02)],
        ];

        fingerBases.forEach((base, i) => {
          let prev = joints.push(base) - 1;
          const anchor = i < 2 ? 3 : 4;
          links.push([anchor, prev]);

          fingerDirections[i].forEach((seg) => {
            const next = v(base.x + seg.x, base.y + seg.y, base.z + seg.z);
            const idx = joints.push(next) - 1;
            links.push([prev, idx]);
            prev = idx;
          });
        });

        const thumb = [
          v(-0.82, 0.16, 0.12),
          v(-1.12, 0.4, 0.2),
          v(-1.26, 0.64, 0.26),
          v(-1.31, 0.83, 0.29),
        ];

        let thumbPrev = joints.push(thumb[0]) - 1;
        links.push([1, thumbPrev]);
        for (let i = 1; i < thumb.length; i += 1) {
          const idx = joints.push(thumb[i]) - 1;
          links.push([thumbPrev, idx]);
          thumbPrev = idx;
        }

        return { joints, links };
      }

      const skeleton = makeHandSkeleton();

      let pointerDown = false;
      let lastX = 0;
      let lastY = 0;
      let dragYaw = -0.64;
      let dragPitch = -0.23;

      canvas.addEventListener("pointerdown", (event) => {
        pointerDown = true;
        lastX = event.clientX;
        lastY = event.clientY;
      });

      window.addEventListener("pointerup", () => {
        pointerDown = false;
      });

      window.addEventListener("pointermove", (event) => {
        if (!pointerDown) {
          return;
        }
        const dx = event.clientX - lastX;
        const dy = event.clientY - lastY;
        dragYaw += dx * 0.005;
        dragPitch += dy * 0.004;
        dragPitch = Math.max(-0.85, Math.min(0.25, dragPitch));
        lastX = event.clientX;
        lastY = event.clientY;
      });

      function render(timeMs) {
        const t = timeMs * 0.001;
        ctx.clearRect(0, 0, width, height);

        drawGrid(t);

        const pulse = 0.55 + (Math.sin(t * 1.9) + 1) * 0.15;
        const handRotation = {
          x: dragPitch + Math.sin(t * 0.6) * 0.05,
          y: dragYaw + Math.cos(t * 0.42) * 0.08,
          z: 0.2 + Math.sin(t * 0.73) * 0.03,
        };

        const handOffset = v(0.12, 0.22 + Math.sin(t * 0.9) * 0.04, 0.0);
        const points = skeleton.joints.map((joint) =>
          transformPoint(joint, handRotation, handOffset)
        );

        skeleton.links.forEach(([a, b]) => {
          const depth = (points[a].z + points[b].z) * 0.5;
          const alpha = 0.2 + (depth + 1.8) * 0.09 + pulse * 0.16;
          drawLine(points[a], points[b], Math.min(0.88, Math.max(0.15, alpha)), 1.6);
        });

        points.forEach((point, index) => {
          const jointPulse = 0.3 + (Math.sin(t * 2.2 + index * 0.41) + 1) * 0.18;
          drawJoint(point, 7, jointPulse);
        });

        const haloCenter = project(v(0.1, 0.55, 0.12));
        ctx.strokeStyle = `rgba(148,227,255,${0.2 + Math.sin(t * 1.4) * 0.07})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.ellipse(haloCenter.x, haloCenter.y, 118, 28, 0, 0, Math.PI * 2);
        ctx.stroke();

        requestAnimationFrame(render);
      }

      window.addEventListener("resize", resize);
      resize();
      requestAnimationFrame(render);
    </script>
  </body>
</html>
