name: Build MSIX

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: "x64"

      - name: Add Windows SDK (MakeAppx) to PATH
        shell: pwsh
        run: |
          $sdk = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Directory |
                   Where-Object { $_.Name -match "^10\." } |
                   Sort-Object Name -Descending | Select-Object -First 1
          $path = Join-Path $sdk.FullName "x64"
          echo "$path" | Out-File -FilePath $env:GITHUB_PATH -Append
          Write-Host "Added $path to PATH"

      - name: Build MSIX
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File packaging\build_msix.ps1

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: MotionBloom-msix
          path: dist/MotionBloom.msix
